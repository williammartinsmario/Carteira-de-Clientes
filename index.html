<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>CRM Completo</title>

<style>
body{font-family:Arial;background:#f5f7fb;margin:0;padding:20px}
input,button,textarea,select{padding:8px;margin:4px}
.card{background:#fff;padding:10px;margin:10px 0;border-radius:8px}
.alert{padding:10px;border-radius:8px;margin:5px 0}
.overdue{background:#fee2e2}
.today{background:#ffedd5}
.soon{background:#eff6ff}
</style>

</head>
<body>

<h2>CRM Completo</h2>

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input type="date" id="proximo">
<textarea id="obs" placeholder="Observações"></textarea>
<br>

<button onclick="salvar()">Salvar</button>

<br><br>

<input type="file" id="importar">
<button onclick="exportar()">Exportar Backup</button>

<h3>Alertas</h3>
<div id="alertas"></div>

<h3>Clientes</h3>
<div id="lista"></div>

<script>

const KEY="crm";
let clientes=JSON.parse(localStorage.getItem(KEY)||"[]");

function salvar(){
  const c={
    id:Date.now(),
    nome:nome.value,
    telefone:telefone.value,
    proximo:proximo.value,
    obs:obs.value
  };

  clientes.push(c);
  localStorage.setItem(KEY,JSON.stringify(clientes));

  limpar();
  render();
}

function limpar(){
  nome.value="";
  telefone.value="";
  proximo.value="";
  obs.value="";
}

function render(){
  lista.innerHTML="";
  alertas.innerHTML="";

  const hoje=new Date(); hoje.setHours(0,0,0,0);

  clientes.forEach(c=>{
    lista.innerHTML+=`
    <div class="card">
      ${c.nome} - ${c.telefone}
      <button onclick="excluir(${c.id})">Excluir</button>
    </div>`;

    if(!c.proximo) return;

    const data=new Date(c.proximo);
    const diff=Math.round((data-hoje)/86400000);

    let classe="soon";
    let texto="Em breve";

    if(diff<0){classe="overdue";texto="Atrasado";}
    else if(diff==0){classe="today";texto="Hoje";}

    if(diff<=3){
      alertas.innerHTML+=`
      <div class="alert ${classe}">
        ${texto}: ${c.nome}
      </div>`;
    }
  });
}

function excluir(id){
  clientes=clientes.filter(c=>c.id!=id);
  localStorage.setItem(KEY,JSON.stringify(clientes));
  render();
}

function exportar(){
  const blob=new Blob([JSON.stringify(clientes)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="backup.json";
  a.click();
}

document.getElementById("importar").addEventListener("change",function(e){
  const file=e.target.files[0];
  const reader=new FileReader();

  reader.onload=function(){
    const dados=JSON.parse(reader.result);
    clientes=[...clientes,...dados];
    localStorage.setItem(KEY,JSON.stringify(clientes));
    render();
  };

  reader.readAsText(file);
});

render();

</script>

</body>
</html>
